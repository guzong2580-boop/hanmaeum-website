# ════════════════════════════════════════════════════════
# 한마음일터 — Decap CMS 설정
# ════════════════════════════════════════════════════════
# 셋업 후: 사이트URL/admin 으로 접속 → 로그인 → 콘텐츠 편집
# 자세한 셋업 가이드는 프로젝트 루트의 DEPLOY.md 참고

backend:
  name: git-gateway
  branch: main

# 로컬 테스트 시 (npx decap-server 실행 후 활성화)
# local_backend: true

media_folder: "uploads"
public_folder: "/uploads"

site_url: https://iridescent-kataifi-a2538c.netlify.app
display_url: https://iridescent-kataifi-a2538c.netlify.app
locale: ko

collections:

  # ═════════════ 공지사항 ═════════════
  - name: "notices"
    label: "📢 공지사항"
    description: "사이트 커뮤니티 → 공지사항 탭에 표시되는 글 목록"
    files:
      - file: "content/notices.json"
        label: "공지사항 목록"
        name: "notices"
        format: "json"
        fields:
          - label: "공지사항"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} ({{fields.date}})"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "유형", name: "type", widget: "select", options: ["공지", "비공개"], default: "공지", hint: "비공개로 설정하면 빨간 배지가 붙고 관리자만 열람 가능 표시됩니다" }
              - { label: "날짜", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
              - { label: "내용", name: "body", widget: "markdown", required: false, hint: "글 본문 (현재는 목록에만 표시됨, 추후 상세보기에서 사용)" }

  # ═════════════ 자료실 ═════════════
  - name: "archive"
    label: "📁 자료실"
    description: "사이트 커뮤니티 → 자료실 탭에 표시되는 다운로드 파일 목록"
    files:
      - file: "content/archive.json"
        label: "자료실 목록"
        name: "archive"
        format: "json"
        fields:
          - label: "자료"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} · {{fields.type}}"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "string" }
              - { label: "파일 업로드", name: "file", widget: "file", required: false, hint: "PDF·HWP·ZIP 등 파일을 직접 올려주세요" }
              - { label: "유형", name: "type", widget: "select", options: ["PDF", "HWP", "DOC", "ZIP", "IMG"], default: "PDF" }
              - { label: "용량", name: "size", widget: "string", required: false, hint: "예: 2.4 MB (자동 계산되지 않으니 직접 입력)" }
              - { label: "날짜", name: "date", widget: "string", required: false, hint: "예: 2025-12" }

  # ═════════════ 갤러리 ═════════════
  - name: "gallery"
    label: "📷 갤러리"
    description: "사이트 커뮤니티 → 갤러리 탭에 표시되는 사진 목록"
    files:
      - file: "content/gallery.json"
        label: "갤러리 목록"
        name: "gallery"
        format: "json"
        fields:
          - label: "사진"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} ({{fields.date}})"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "날짜", name: "date", widget: "string", hint: "예: 2025-12" }
              - { label: "사진", name: "image", widget: "image", required: false, hint: "사진을 올리면 이미지로, 없으면 색상+이모지로 표시됩니다" }
              - { label: "(이미지 없을 때) 색상", name: "color", widget: "select", options: ["lavender","pink","mint","yellow","sky"], default: "lavender", required: false }
              - { label: "(이미지 없을 때) 이모지", name: "emoji", widget: "string", required: false, default: "📷" }
