<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1800" font-family="'Pretendard','Apple SD Gothic Neo','맑은 고딕',sans-serif">

  <defs>
